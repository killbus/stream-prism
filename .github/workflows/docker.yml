name: Docker

on:
  push:
    branches: [main]
    tags: [v*]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: check-dh
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -n "$USERNAME" ] && [ -n "$PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        if: steps.check-dh.outputs.available == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for GHCR
        uses: docker/metadata-action@v6
        id: meta-ghcr
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-${{ matrix.suffix }},onlatest=true
          tags: |
            type=sha,format=short,event=branch
            type=semver,pattern={{version}},event=tag
            type=semver,pattern={{major}}.{{minor}},event=tag
            type=raw,value=latest,event=tag

      - name: Extract metadata for Docker Hub
        uses: docker/metadata-action@v6
        id: meta-dh
        if: steps.check-dh.outputs.available == 'true'
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/stream-prism
          flavor: |
            suffix=-${{ matrix.suffix }},onlatest=true
          tags: |
            type=sha,format=short,event=branch
            type=semver,pattern={{version}},event=tag
            type=semver,pattern={{major}}.{{minor}},event=tag
            type=raw,value=latest,event=tag

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        id: build-ghcr
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ matrix.suffix }},mode=max

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        if: steps.check-dh.outputs.available == 'true'
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-dh.outputs.tags }}
          labels: ${{ steps.meta-dh.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ matrix.suffix }},mode=max

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: check-dh
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -n "$USERNAME" ] && [ -n "$PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        if: steps.check-dh.outputs.available == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for GHCR
        uses: docker/metadata-action@v6
        id: meta-ghcr
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short,event=branch
            type=semver,pattern={{version}},event=tag
            type=semver,pattern={{major}}.{{minor}},event=tag
            type=raw,value=latest,event=tag

      - name: Extract metadata for Docker Hub
        uses: docker/metadata-action@v6
        id: meta-dh
        if: steps.check-dh.outputs.available == 'true'
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/stream-prism
          tags: |
            type=sha,format=short,event=branch
            type=semver,pattern={{version}},event=tag
            type=semver,pattern={{major}}.{{minor}},event=tag
            type=raw,value=latest,event=tag

      - name: Create and push multi-arch GHCR images
        run: |
          echo "${{ steps.meta-ghcr.outputs.tags }}" | while read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" "${tag}-amd64" "${tag}-arm64"
          done

      - name: Create and push multi-arch Docker Hub images
        if: steps.check-dh.outputs.available == 'true'
        run: |
          echo "${{ steps.meta-dh.outputs.tags }}" | while read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" "${tag}-amd64" "${tag}-arm64"
          done
